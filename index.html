<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dino-Pop!</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; user-select: none; }
  html, body {
    background: #0a0612;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Trebuchet MS', 'Arial Black', sans-serif;
    overflow: hidden;
  }
  #wrap { position: relative; }
  #topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 560px;
    padding: 6px 4px;
    color: #ffe9a0;
    font-weight: bold;
    text-shadow: 1px 1px 0 #4a1e00, 0 0 8px #ff9000;
  }
  .stat { font-size: 15px; letter-spacing: 1px; }
  .stat b { color: #fff; font-size: 19px; }
  #soundBtn {
    background: #3a2a10; color: #ffd23f; border: 2px solid #ffb000;
    border-radius: 6px; padding: 3px 9px; cursor: pointer; font-weight: bold; font-size: 13px;
  }
  #gameCanvas {
    border-radius: 10px;
    box-shadow: 0 0 0 4px #5a3a14, 0 0 0 8px #2a1a08, 0 12px 40px #000a, 0 0 50px #ff700033;
    cursor: crosshair;
    display: block;
  }
  #overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 14px; background: radial-gradient(circle at 50% 40%, #2a154488 0%, #0a0612ee 80%);
    border-radius: 10px;
  }
  #title {
    font-size: 78px; font-weight: 900; letter-spacing: 2px;
    color: #ffd23f;
    text-shadow: 0 4px 0 #b04000, 0 6px 0 #802000, 0 0 30px #ff8000, 4px 4px 0 #000;
    transform: rotate(-4deg);
  }
  #title small { display:block; font-size: 20px; letter-spacing: 6px; color:#9be870; transform: rotate(4deg); text-shadow: 1px 1px 0 #000;}
  #msg { font-size: 44px; font-weight: 900; color: #fff; text-shadow: 0 3px 0 #c00, 0 0 20px #f80; }
  #sub { font-size: 18px; color: #ffe9a0; text-align:center; line-height: 1.5; text-shadow: 1px 1px 0 #000; }
  #playBtn {
    margin-top: 6px; padding: 14px 46px; font-size: 24px; font-weight: 900; font-family: inherit;
    background: linear-gradient(180deg, #8be84a 0%, #3a9818 100%);
    color: #fff; border: 3px solid #ffe9a0; border-radius: 40px; cursor: pointer;
    text-shadow: 1px 2px 0 #2a5010; box-shadow: 0 5px 0 #2a6010, 0 8px 18px #000a;
    letter-spacing: 2px; transition: transform .08s;
  }
  #playBtn:hover { transform: scale(1.05); }
  #playBtn:active { transform: translateY(4px); box-shadow: 0 1px 0 #2a6010; }
  .hidden { display: none !important; }
</style>
</head>
<body>
<div id="wrap">
  <div id="topbar">
    <div class="stat">SCORE&nbsp;<b id="scoreEl">0</b></div>
    <div class="stat">BEST&nbsp;<b id="hsEl">0</b></div>
    <div class="stat">LEVEL&nbsp;<b id="levelEl">1</b></div>
    <div class="stat">SHOTS&nbsp;<b id="shotsEl">0</b></div>
    <button id="soundBtn">🔊 SND</button>
  </div>
  <canvas id="gameCanvas" width="560" height="720"></canvas>
  <div id="overlay">
    <div id="title">DINO-POP!<small>P R E H I S T O R I C&nbsp;&nbsp;P O P</small></div>
    <div id="msg" class="hidden"></div>
    <div id="sub">Aim with the mouse, click or press SPACE to launch an egg.<br>Match <b>3 or more</b> of the same color to pop them!<br>Don't let the eggs reach the bottom.</div>
    <button id="playBtn">PLAY!</button>
  </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = 560, H = 720;

// ── HiDPI: scale the backing store so everything renders crisp ───────────────
const DPR = Math.min(window.devicePixelRatio || 1, 2.5);
canvas.style.width = W + 'px';
canvas.style.height = H + 'px';
canvas.width = Math.round(W * DPR);
canvas.height = Math.round(H * DPR);
ctx.scale(DPR, DPR);          // base transform persists across frames (draw() is save/restore balanced)
ctx.imageSmoothingEnabled = true;

// ───────────────────────────── geometry ─────────────────────────────
const MARGIN = 16;
const R = 21, D = R * 2;            // egg radius / diameter
const COLS_EVEN = 12, COLS_ODD = 11;
const TOP_Y = 60;                   // y-center of row 0
const ROW_H = Math.round(D * 0.866);
const LAUNCH_X = W / 2, LAUNCH_Y = H - 56;
const DANGER_Y = H - 150;
const CLAMP_MIN = MARGIN + R, CLAMP_MAX = W - MARGIN - R;
const CEIL_Y = TOP_Y - ROW_H * 0.5;

// ───────────────────────────── palette ──────────────────────────────
const PALETTE = [
  { base:'#ff5b5b', light:'#ffb0a8', dark:'#9c1f1f', spot:'#c43030' }, // red
  { base:'#4aa8ff', light:'#aed8ff', dark:'#15508f', spot:'#2f7fd0' }, // blue
  { base:'#5fd35f', light:'#bdf0a8', dark:'#1f7a2a', spot:'#33a040' }, // green
  { base:'#ffd23f', light:'#fff0a8', dark:'#a87c00', spot:'#d0a000' }, // yellow
  { base:'#c26af0', light:'#e6c0ff', dark:'#6a2a9c', spot:'#9040c4' }, // purple
  { base:'#ff9c3a', light:'#ffd6a0', dark:'#a85800', spot:'#d07820' }, // orange
];

// ───────────────────────────── state ────────────────────────────────
let grid = [];          // grid[row][col] = egg | null
let rowParity = 0;      // flips on each descend so visuals stay stable
let score = 0, level = 1, shots = 0;
let highScore = parseInt(localStorage.getItem('dinopop_hs') || '0');
let numColors = 4;
let combo = 0, nextIsBomb = false;
let queue = [];         // upcoming eggs [loaded, next]
let proj = null;        // flying egg
let aimAngle = -Math.PI / 2;
let running = false, paused = false;
let particles = [], popping = [], falling = [], scorePops = [];
let shake = 0, flash = 0;
let whirley = null, whirleyTimer = 0, whirleyMsg = 0;
let comboMsg = 0, comboMsgT = 0;
let foot = null;        // mama stomp animation
let descendEvery = 6;   // shots between descents
let animId = null, lastT = 0;
let recoil = 0;         // dino kick on fire
let slide = 0;          // smooth-descend visual offset (px, <=0)
let hitstop = 0;        // brief freeze for impact
let gridVer = 0;        // bumped on any grid mutation (aim cache invalidation)

// ───────────────────────────── easing / helpers ─────────────────────
const rnd = (a,b)=> a + Math.random()*(b-a);
const clamp = (v,a,b)=> v<a?a:(v>b?b:v);
function randColor(){ return Math.floor(Math.random()*numColors); }
function easeOutBack(t){ const c1=1.70158, c3=c1+1; return 1 + c3*Math.pow(t-1,3) + c1*Math.pow(t-1,2); }
function touchGrid(){ gridVer++; }

function makeEgg(color){ return { color, wob: Math.random()*Math.PI*2, appear: 1 }; }

function parityEven(r){ return ((r + rowParity) & 1) === 0; }
function colsForRow(r){ return parityEven(r) ? COLS_EVEN : COLS_ODD; }
function cellX(r,c){ return parityEven(r) ? (MARGIN + R + c*D) : (MARGIN + 2*R + c*D); }
function cellY(r){ return TOP_Y + r*ROW_H; }
function validCell(r,c){ return r>=0 && r<grid.length && c>=0 && c<colsForRow(r); }

function neighbors(r,c){
  const out = [[r,c-1],[r,c+1]];
  if(parityEven(r)){ out.push([r-1,c-1],[r-1,c],[r+1,c-1],[r+1,c]); }
  else            { out.push([r-1,c],[r-1,c+1],[r+1,c],[r+1,c+1]); }
  return out.filter(([rr,cc])=> validCell(rr,cc));
}

function emptyRowAt(idx){ return new Array(colsForRow(idx)).fill(null); }
function ensureRows(upto){ while(grid.length <= upto) grid.push(emptyRowAt(grid.length)); }

// ═════════════════════════ AUDIO (improved) ═════════════════════════
let audioOn = true, actx = null, master = null, noiseBuf = null, pad = null;
function ensureAudio(){
  if(actx) return;
  try{
    actx = new (window.AudioContext || window.webkitAudioContext)();
    master = actx.createGain(); master.gain.value = 0.85;
    const comp = actx.createDynamicsCompressor();
    master.connect(comp); comp.connect(actx.destination);
  }catch(e){ audioOn = false; }
}
function getNoise(){
  if(noiseBuf || !actx) return noiseBuf;
  const len = Math.floor(actx.sampleRate*0.4);
  noiseBuf = actx.createBuffer(1, len, actx.sampleRate);
  const d = noiseBuf.getChannelData(0);
  for(let i=0;i<len;i++) d[i] = Math.random()*2-1;
  return noiseBuf;
}
function tone(freq, dur, type='sine', vol=0.15, slideTo=null){
  if(!audioOn || !actx) return;
  const o = actx.createOscillator(), g = actx.createGain();
  o.type = type; o.frequency.value = freq;
  if(slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, actx.currentTime + dur);
  g.gain.value = vol; g.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime + dur);
  o.connect(g); g.connect(master);
  o.start(); o.stop(actx.currentTime + dur);
}
function noiseHit(dur, vol, freq, q=1){
  if(!audioOn || !actx) return;
  const s = actx.createBufferSource(); s.buffer = getNoise();
  const f = actx.createBiquadFilter(); f.type='bandpass'; f.frequency.value=freq; f.Q.value=q;
  const g = actx.createGain(); g.gain.value=vol; g.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime+dur);
  s.connect(f); f.connect(g); g.connect(master);
  s.start(); s.stop(actx.currentTime+dur);
}
function sfxShoot(){ noiseHit(0.09,0.10,1200,0.7); tone(380,0.10,'square',0.05,620); }
function sfxPop(n){ tone(440+n*55,0.14,'triangle',0.13,820+n*70); noiseHit(0.07,0.06,1600,1.2); }
function sfxDrop(){ tone(280,0.28,'sine',0.10,80); }
function sfxThunder(){ noiseHit(0.5,0.18,140,0.4); tone(70,0.5,'sawtooth',0.18,38); }
function sfxStomp(){ noiseHit(0.5,0.3,90,0.3); tone(55,0.6,'sawtooth',0.28,28); }
function sfxClick(){ tone(680,0.07,'square',0.07); }
// subtle ambient pad
function ensurePad(){
  if(pad || !actx) return;
  try{
    const g = actx.createGain(); g.gain.value=0; g.connect(master);
    const f = actx.createBiquadFilter(); f.type='lowpass'; f.frequency.value=520; f.Q.value=4; f.connect(g);
    const o1 = actx.createOscillator(); o1.type='sawtooth'; o1.frequency.value=55;
    const o2 = actx.createOscillator(); o2.type='sawtooth'; o2.frequency.value=82.4; o2.detune.value=7;
    o1.connect(f); o2.connect(f);
    const lfo = actx.createOscillator(); lfo.frequency.value=0.06;
    const lg = actx.createGain(); lg.gain.value=160; lfo.connect(lg); lg.connect(f.frequency);
    o1.start(); o2.start(); lfo.start();
    pad = { g };
  }catch(e){ pad = null; }
}
function syncMusic(){
  ensureAudio(); ensurePad();
  if(!pad || !actx) return;
  const on = running && !paused && audioOn;
  pad.g.gain.cancelScheduledValues(actx.currentTime);
  pad.g.gain.linearRampToValueAtTime(on?0.045:0.0001, actx.currentTime+0.6);
}

// ═════════════════════════ SPRITE CACHE ═════════════════════════════
// Pre-render each egg colour (and the colour-blind symbol) once, so the
// per-frame cost is a cheap drawImage instead of a fresh radial gradient.
const EGG_HW = R*0.86, EGG_HH = R*1.08;
const SPR_PAD = 7;
const SPR_W = Math.ceil(EGG_HW*2 + SPR_PAD*2);
const SPR_H = Math.ceil(EGG_HH*2 + SPR_PAD*2);
let eggSprites = [];
function lcg(seed){ let s=seed%2147483647; if(s<=0)s+=2147483646; return ()=> (s=s*16807%2147483647)/2147483647; }

function buildEggSprite(color){
  const cv = document.createElement('canvas');
  cv.width = Math.ceil(SPR_W*DPR); cv.height = Math.ceil(SPR_H*DPR);
  const c = cv.getContext('2d'); c.scale(DPR,DPR); c.translate(SPR_W/2, SPR_H/2);
  const p = PALETTE[color];
  // body
  const g = c.createRadialGradient(-R*0.3,-R*0.4,2, 0,0,R*1.25);
  g.addColorStop(0,p.light); g.addColorStop(0.45,p.base); g.addColorStop(1,p.dark);
  c.beginPath(); c.ellipse(0,0,EGG_HW,EGG_HH,0,0,Math.PI*2); c.fillStyle=g; c.fill();
  // baked speckles (deterministic per colour)
  const rng = lcg(9871 + color*733);
  c.fillStyle = p.spot; c.globalAlpha = 0.6;
  const ns = 4 + Math.floor(rng()*3);
  for(let i=0;i<ns;i++){ const a=rng()*Math.PI*2, rr=rng()*R*0.5;
    const dx=Math.cos(a)*rr, dy=Math.sin(a)*rr*1.15, sr=1.6+rng()*2.4;
    c.beginPath(); c.ellipse(dx,dy,sr,sr*0.85,0,0,Math.PI*2); c.fill(); }
  c.globalAlpha = 1;
  // outline
  c.lineWidth=1.5; c.strokeStyle='rgba(0,0,0,0.22)';
  c.beginPath(); c.ellipse(0,0,EGG_HW,EGG_HH,0,0,Math.PI*2); c.stroke();
  // gloss
  c.beginPath(); c.ellipse(-R*0.28,-R*0.44,R*0.27,R*0.16,-0.5,0,Math.PI*2);
  c.fillStyle='rgba(255,255,255,0.6)'; c.fill();
  // colour-blind symbol
  c.globalAlpha = 0.5; c.fillStyle='rgba(0,0,0,0.62)';
  if(color===0){ c.beginPath(); c.moveTo(0,-6); c.lineTo(5.5,5); c.lineTo(-5.5,5); c.closePath(); c.fill(); }
  else if(color===1){ c.beginPath(); c.arc(0,1,5.5,0,Math.PI*2); c.fill(); }
  else if(color===2){ c.fillRect(-4.5,-3.5,9,9); }
  else if(color===3){ c.beginPath();
    for(let i=0;i<5;i++){ const a=i*Math.PI*2/5-Math.PI/2; c.lineTo(Math.cos(a)*6,Math.sin(a)*6+1);
      const b=a+Math.PI/5; c.lineTo(Math.cos(b)*2.5,Math.sin(b)*2.5+1); } c.closePath(); c.fill(); }
  else if(color===4){ c.beginPath(); c.moveTo(0,-7); c.lineTo(5,0); c.lineTo(0,7); c.lineTo(-5,0); c.closePath(); c.fill(); }
  else if(color===5){ c.fillRect(-1.5,-6,3,12); c.fillRect(-6,-1.5,12,3); }
  c.globalAlpha = 1;
  return cv;
}
function buildSprites(){ eggSprites = PALETTE.map((_,i)=>buildEggSprite(i)); }

function drawEgg(x,y,color,scale=1,alpha=1,rot=0){
  const spr = eggSprites[color];
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(x,y);
  if(rot) ctx.rotate(rot);
  ctx.scale(scale,scale);
  ctx.drawImage(spr, -SPR_W/2, -SPR_H/2, SPR_W, SPR_H);
  ctx.restore();
}

// ───────────────────────────── background cache ─────────────────────
let bgCanvas = null;
function buildBackground(){
  const cv = document.createElement('canvas');
  cv.width = Math.ceil(W*DPR); cv.height = Math.ceil(H*DPR);
  const c = cv.getContext('2d'); c.scale(DPR,DPR);
  const sky = c.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#2a1448'); sky.addColorStop(0.5,'#3a1a40'); sky.addColorStop(1,'#1a0c28');
  c.fillStyle=sky; c.fillRect(0,0,W,H);
  // volcanoes
  c.fillStyle='#241030';
  c.beginPath(); c.moveTo(W*0.05,H*0.62); c.lineTo(W*0.30,H*0.30); c.lineTo(W*0.40,H*0.36); c.lineTo(W*0.60,H*0.62); c.closePath(); c.fill();
  c.fillStyle='#3a1838';
  c.beginPath(); c.moveTo(W*0.5,H*0.62); c.lineTo(W*0.78,H*0.34); c.lineTo(W*1.0,H*0.62); c.closePath(); c.fill();
  c.fillStyle='rgba(255,120,0,0.5)';
  c.beginPath(); c.ellipse(W*0.34,H*0.31,14,5,0,0,Math.PI*2); c.fill();
  // ground
  const gnd = c.createLinearGradient(0,H-90,0,H);
  gnd.addColorStop(0,'#3a2a14'); gnd.addColorStop(1,'#1a1008');
  c.fillStyle=gnd; c.fillRect(0,H-90,W,90);
  // ceiling rock bar
  const cap = c.createLinearGradient(0,0,0,CEIL_Y);
  cap.addColorStop(0,'#5a4020'); cap.addColorStop(1,'#3a2810');
  c.fillStyle=cap; c.fillRect(0,0,W,CEIL_Y);
  c.fillStyle='#2a1c0a';
  for(let x=0;x<W;x+=28){ c.beginPath(); c.moveTo(x,CEIL_Y); c.lineTo(x+10,CEIL_Y-7); c.lineTo(x+20,CEIL_Y); c.fill(); }
  // vignette
  const vg = c.createRadialGradient(W/2,H*0.46,H*0.30, W/2,H*0.5,H*0.72);
  vg.addColorStop(0,'rgba(0,0,0,0)'); vg.addColorStop(1,'rgba(0,0,0,0.45)');
  c.fillStyle=vg; c.fillRect(0,0,W,H);
  bgCanvas = cv;
}
const EMBERS = Array.from({length:34},()=>({ x:Math.random()*W, y:Math.random()*H*0.55, ph:Math.random()*6, r:0.6+Math.random()*1.4 }));

// ───────────────────────────── level setup ──────────────────────────
function buildLevel(){
  grid = []; rowParity = 0;
  numColors = Math.min(PALETTE.length, 4 + Math.floor((level-1)/2));
  descendEvery = Math.max(3, 7 - Math.floor((level-1)/2));
  const startRows = Math.min(6, 4 + Math.floor(level/2));
  for(let r=0;r<startRows;r++){
    const row = [];
    const cols = colsForRow(r);
    for(let c=0;c<cols;c++) row.push(Math.random() < 0.92 ? makeEgg(randColor()) : null);
    grid.push(row);
  }
  queue = [makeEgg(pickActiveColor()), makeEgg(pickActiveColor())];
  proj = null; combo = 0; nextIsBomb = false;
  particles=[]; popping=[]; falling=[]; scorePops=[];
  whirley=null; whirleyTimer=8; whirleyMsg=0; foot=null;
  slide=0; recoil=0; hitstop=0; comboMsgT=0;
  touchGrid();
  updateHUD();
}

function pickActiveColor(){
  const present = new Set();
  for(const row of grid) for(const e of row) if(e) present.add(e.color);
  if(present.size === 0) return randColor();
  if(Math.random() < 0.8){ const arr=[...present]; return arr[Math.floor(Math.random()*arr.length)]; }
  return randColor();
}

// ───────────────────────────── shooting ─────────────────────────────
function shoot(){
  if(!running || proj || paused || foot) return;
  ensureAudio();
  const vx = Math.cos(aimAngle), vy = Math.sin(aimAngle);
  const egg = queue.shift();
  proj = { x: LAUNCH_X, y: LAUNCH_Y - 34, vx, vy, egg, bomb: nextIsBomb, spin: 0 };
  if(nextIsBomb){ nextIsBomb = false; }
  queue.push(makeEgg(pickActiveColor()));
  shots++; recoil = 1; updateHUD();
  sfxShoot();
}

function stepProjectile(k){
  if(!proj) return;
  const dist = 13 * k;
  const sub = Math.max(1, Math.ceil(dist/3));
  const step = dist/sub;
  for(let s=0;s<sub;s++){
    proj.x += proj.vx*step;
    proj.y += proj.vy*step;
    proj.spin += 0.3;
    if(proj.x < CLAMP_MIN){ proj.x = CLAMP_MIN; proj.vx = Math.abs(proj.vx); }
    if(proj.x > CLAMP_MAX){ proj.x = CLAMP_MAX; proj.vx = -Math.abs(proj.vx); }
    if(proj.y - R <= CEIL_Y){ place(); return; }
    for(let r=0;r<grid.length;r++){
      const row = grid[r];
      for(let c=0;c<row.length;c++){
        if(!row[c]) continue;
        const dx = proj.x - cellX(r,c), dy = proj.y - cellY(r);
        if(dx*dx + dy*dy < (D-3)*(D-3)){ place(); return; }
      }
    }
  }
}

function findSnap(x,y){
  let er = clamp(Math.round((y - TOP_Y)/ROW_H), 0, grid.length);
  ensureRows(er+1);
  let best=null, bd=Infinity;
  for(let r=Math.max(0,er-1); r<=Math.min(grid.length-1,er+1); r++){
    for(let c=0;c<colsForRow(r);c++){
      if(grid[r][c]) continue;
      const dx = x-cellX(r,c), dy = y-cellY(r), d = dx*dx+dy*dy;
      if(d<bd){ bd=d; best=[r,c]; }
    }
  }
  return best;
}

function place(){
  if(!proj) return;
  if(proj.bomb){ bombBlast(proj.x, proj.y); proj=null; afterShot(false); return; }
  const cell = findSnap(proj.x, proj.y);
  const egg = proj.egg; proj = null;
  if(!cell){ afterShot(false); return; }
  const [r,c] = cell;
  ensureRows(r);
  egg.appear = 0;          // snap-in animation
  grid[r][c] = egg;
  const group = floodColor(r, c, egg.color);
  let popped = false;
  if(group.length >= 3){ popGroup(group); popped = true; sfxPop(group.length); }
  dropFloating();
  afterShot(popped);
}

function afterShot(popped){
  if(popped){
    combo++;
    if(combo >= 3){ comboMsg = combo; comboMsgT = 1; }
    if(combo >= 4 && !nextIsBomb){ nextIsBomb = true; flash = 1; sfxThunder(); whirleyMsg = 90; }
  } else {
    combo = 0;
  }
  trimBottom();
  if(shots > 0 && shots % descendEvery === 0) descend();
  touchGrid();
  if(boardEmpty()){ levelClear(); return; }
  checkGameOver();
  updateHUD();
}

function floodColor(r,c,color){
  const seen = new Set([r+','+c]), out=[[r,c]], stack=[[r,c]];
  while(stack.length){
    const [cr,cc] = stack.pop();
    for(const [nr,nc] of neighbors(cr,cc)){
      const k = nr+','+nc;
      if(seen.has(k)) continue;
      const e = grid[nr][nc];
      if(e && e.color===color){ seen.add(k); out.push([nr,nc]); stack.push([nr,nc]); }
    }
  }
  return out;
}

function popGroup(cells){
  const bonus = cells.length > 3 ? (cells.length-3)*15 : 0;
  for(const [r,c] of cells){
    const e = grid[r][c];
    popping.push({ x:cellX(r,c), y:cellY(r), color:e.color, t:0 });
    spawnBurst(cellX(r,c), cellY(r), e.color, 6);
    grid[r][c] = null;
  }
  const gained = cells.length*10 + bonus;
  score += gained;
  addScorePop(cellX(cells[0][0],cells[0][1]), cellY(cells[0][0]), gained, combo);
  shake = Math.min(11, 3 + cells.length*0.7);
  if(cells.length >= 4) hitstop = Math.min(0.09, 0.04 + cells.length*0.008);
}

function dropFloating(){
  const connected = new Set();
  const stack = [];
  for(let c=0;c<colsForRow(0);c++) if(grid[0] && grid[0][c]){ connected.add('0,'+c); stack.push([0,c]); }
  while(stack.length){
    const [cr,cc] = stack.pop();
    for(const [nr,nc] of neighbors(cr,cc)){
      const k = nr+','+nc;
      if(connected.has(k)) continue;
      if(grid[nr][nc]){ connected.add(k); stack.push([nr,nc]); }
    }
  }
  let dropped = 0;
  for(let r=0;r<grid.length;r++){
    for(let c=0;c<colsForRow(r);c++){
      if(grid[r][c] && !connected.has(r+','+c)){
        const e = grid[r][c];
        falling.push({ x:cellX(r,c), y:cellY(r), vx:rnd(-1.5,1.5), vy:rnd(-1,1), color:e.color, rot:0, vr:rnd(-0.2,0.2) });
        grid[r][c] = null; dropped++;
      }
    }
  }
  if(dropped){
    score += dropped*25; sfxDrop();
    shake = Math.min(13, shake + dropped*0.5);
  }
}

function bombBlast(x,y){
  flash = 1; sfxStomp(); shake = 16; hitstop = 0.1;
  const rad = D*2.4;
  let hit = 0;
  for(let r=0;r<grid.length;r++){
    for(let c=0;c<colsForRow(r);c++){
      if(!grid[r][c]) continue;
      const dx = x-cellX(r,c), dy = y-cellY(r);
      if(dx*dx+dy*dy <= rad*rad){
        const e = grid[r][c];
        popping.push({ x:cellX(r,c), y:cellY(r), color:e.color, t:0 });
        spawnBurst(cellX(r,c), cellY(r), e.color, 8);
        grid[r][c] = null; hit++;
      }
    }
  }
  for(let i=0;i<28;i++){ const a=Math.random()*Math.PI*2, sp=rnd(2,8);
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,r:rnd(3,7),color:3,life:1,grav:0.1,shard:false}); }
  score += hit*15;
  addScorePop(x,y,hit*15,0);
  dropFloating();
}

function descend(){
  rowParity = 1 - rowParity;
  const len = colsForRow(0);
  const row = [];
  for(let c=0;c<len;c++){ const e = Math.random()<0.95 ? makeEgg(pickActiveColor()) : null; if(e) e.appear=0.2; row.push(e); }
  grid.unshift(row);
  slide = -ROW_H;        // start shifted up, ease down for a smooth slide
  flash = Math.max(flash, 0.4);
  touchGrid();
  checkGameOver();
}

function trimBottom(){
  while(grid.length>0){ if(grid[grid.length-1].every(e=>!e)) grid.pop(); else break; }
}
function boardEmpty(){ for(const row of grid) for(const e of row) if(e) return false; return true; }
function checkGameOver(){
  for(let r=0;r<grid.length;r++)
    for(let c=0;c<colsForRow(r);c++)
      if(grid[r][c] && cellY(r)+R >= DANGER_Y){ triggerStomp(); return; }
}
function triggerStomp(){ if(foot) return; running=false; syncMusic(); foot={ y:-260, t:0, done:false }; }

function levelClear(){
  running=false; syncMusic();
  score += 1000 + level*250;
  level++;
  updateHUD();
  showOverlay('LEVEL '+level+'!', 'Nest cleared! +'+(1000+(level-1)*250)+' bonus\nGet ready for tougher eggs…', 'CONTINUE');
}

// ───────────────────────────── effects ──────────────────────────────
function spawnBurst(x,y,color,n){
  for(let i=0;i<n;i++){ const a=Math.random()*Math.PI*2, sp=rnd(1,5);
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-1,r:rnd(2,5),color,life:1,grav:0.18,shard:false}); }
  // eggshell shards
  for(let i=0;i<3;i++){ const a=Math.random()*Math.PI*2, sp=rnd(2,5);
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-1.5,r:rnd(3,5),color,life:1,grav:0.3,shard:true,rot:Math.random()*6,vr:rnd(-0.4,0.4)}); }
}
function addScorePop(x,y,amt,combo){ scorePops.push({x,y,amt,combo,t:0}); }

// ───────────────────────────── whirley ──────────────────────────────
function updateWhirley(dt,k){
  if(!running) return;
  whirleyTimer -= dt;
  if(!whirley && whirleyTimer<=0){
    whirley = { x:-60, y:rnd(120,200), color:randColor(), dropped:false };
    whirleyTimer = rnd(18,28); whirleyMsg = 120;
  }
  if(whirley){
    whirley.x += 2.6*k;
    whirley.y += Math.sin(whirley.x*0.03)*0.6*k;
    if(whirley.x > W*0.5 && !whirley.dropped){ whirley.dropped = true; descend(); }
    if(whirley.x > W+80) whirley = null;
  }
  if(whirleyMsg>0) whirleyMsg -= dt*60;
}

// ───────────────────────────── aim preview (cached) ─────────────────
let aimCache=null, lastAimAngle=999, lastAimVer=-1;
function getAim(){
  if(aimAngle!==lastAimAngle || gridVer!==lastAimVer){
    aimCache = simulateAim(); lastAimAngle = aimAngle; lastAimVer = gridVer;
  }
  return aimCache;
}
function simulateAim(){
  let x=LAUNCH_X, y=LAUNCH_Y-34, vx=Math.cos(aimAngle), vy=Math.sin(aimAngle);
  const pts=[{x,y}]; const step=8;
  for(let i=0;i<260;i++){
    x+=vx*step; y+=vy*step;
    if(x<CLAMP_MIN){ x=CLAMP_MIN; vx=Math.abs(vx); }
    if(x>CLAMP_MAX){ x=CLAMP_MAX; vx=-Math.abs(vx); }
    pts.push({x,y});
    if(y-R<=CEIL_Y) break;
    let hit=false;
    for(let r=0;r<grid.length && !hit;r++)
      for(let c=0;c<colsForRow(r);c++){
        if(!grid[r][c]) continue;
        const dx=x-cellX(r,c), dy=y-cellY(r);
        if(dx*dx+dy*dy < (D-3)*(D-3)){ hit=true; break; }
      }
    if(hit) break;
  }
  const last = pts[pts.length-1];
  return { pts, target: findSnap(last.x, last.y) };
}

// ───────────────────────────── update ───────────────────────────────
function update(dt){
  const k = clamp(dt*60, 0.2, 3);
  // hit-stop: freeze the world a few frames for impact, then resume
  if(hitstop>0){ hitstop = Math.max(0, hitstop-dt); }
  else if(running && !paused){
    stepProjectile(k);
    updateWhirley(dt,k);
  }

  // smooth descend slide
  if(slide<0){ slide = Math.min(0, slide + ROW_H*5*dt); }

  if(hitstop<=0){
    for(const p of particles){ p.x+=p.vx*k; p.y+=p.vy*k; p.vy+=p.grav*k; if(p.shard) p.rot+=p.vr*k; p.life-=0.025*k; }
    particles = particles.filter(p=>p.life>0);
    for(const p of popping) p.t += 0.08*k;
    popping = popping.filter(p=>p.t<1);
    for(const f of falling){ f.x+=f.vx*k; f.y+=f.vy*k; f.vy+=0.45*k; f.rot+=f.vr*k; }
    falling = falling.filter(f=>f.y < H+60);
    for(const s of scorePops){ s.t += 0.02*k; s.y -= 0.6*k; }
    scorePops = scorePops.filter(s=>s.t<1);
  }

  // egg idle wobble + snap-in
  for(const row of grid) for(const e of row) if(e){ e.wob += 0.03*k; if(e.appear<1) e.appear = Math.min(1, e.appear + dt*6); }

  recoil = Math.max(0, recoil - dt*5);
  shake *= Math.pow(0.85,k); if(shake<0.2) shake=0;
  flash *= Math.pow(0.9,k);  if(flash<0.02) flash=0;
  if(comboMsgT>0) comboMsgT = Math.max(0, comboMsgT - dt*1.4);

  if(foot && !foot.done){
    foot.y += 14*k;
    if(foot.y >= H-120){
      foot.y = H-120; foot.done = true; shake = 20; sfxStomp(); flash = 1;
      setTimeout(()=>{
        showOverlay('GAME OVER', 'Mama Bronto stomped the nest!\nFinal score: '+score, 'TRY AGAIN');
        score=0; level=1; foot=null;
      }, 700);
    }
  }
}

// ───────────────────────────── drawing ──────────────────────────────
function drawBomb(x,y,scale=1){
  ctx.save(); ctx.translate(x,y); ctx.scale(scale,scale);
  const g = ctx.createRadialGradient(-6,-6,2,0,0,R);
  g.addColorStop(0,'#777'); g.addColorStop(1,'#111');
  ctx.beginPath(); ctx.arc(0,0,R*0.92,0,Math.PI*2); ctx.fillStyle=g; ctx.fill();
  ctx.strokeStyle='#000'; ctx.lineWidth=2; ctx.stroke();
  ctx.beginPath(); ctx.ellipse(-7,-7,4,2.5,-0.6,0,Math.PI*2); ctx.fillStyle='rgba(255,255,255,0.5)'; ctx.fill();
  ctx.strokeStyle='#a86'; ctx.lineWidth=3; ctx.beginPath();
  ctx.moveTo(4,-R*0.8); ctx.quadraticCurveTo(14,-R*1.1,10,-R*1.4); ctx.stroke();
  const fx=10, fy=-R*1.4;
  ctx.fillStyle = (Math.floor(animClock*16)%2) ? '#ffd23f' : '#ff7000';
  for(let i=0;i<5;i++){ const a=Math.random()*Math.PI*2,d=Math.random()*5;
    ctx.beginPath(); ctx.arc(fx+Math.cos(a)*d, fy+Math.sin(a)*d, 1.5, 0, Math.PI*2); ctx.fill(); }
  ctx.restore();
}

function drawDino(){
  const x=LAUNCH_X + Math.cos(aimAngle)*recoil*7;
  const y=LAUNCH_Y - Math.sin(aimAngle)*recoil*7 + recoil*3;
  ctx.save(); ctx.translate(x,y);
  ctx.fillStyle='#4fb83a'; ctx.beginPath(); ctx.ellipse(0,28,46,34,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#8fe06a'; ctx.beginPath(); ctx.ellipse(0,36,30,22,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#4fb83a'; ctx.beginPath(); ctx.ellipse(0,-6,30,26,0,0,Math.PI*2); ctx.fill();
  ctx.save(); ctx.rotate(aimAngle + Math.PI/2);
  ctx.fillStyle='#3a9828'; ctx.beginPath(); ctx.ellipse(0,-26,15,22,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#2a7a1c'; ctx.beginPath(); ctx.ellipse(0,-34,10,8,0,0,Math.PI*2); ctx.fill();
  ctx.restore();
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(-12,-14,8,0,Math.PI*2); ctx.arc(12,-14,8,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#222';
  const ex=clamp(Math.cos(aimAngle)*3,-3,3), ey=clamp(Math.sin(aimAngle)*3,-3,1);
  ctx.beginPath(); ctx.arc(-12+ex,-14+ey,4,0,Math.PI*2); ctx.arc(12+ex,-14+ey,4,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#2a7a1c'; ctx.beginPath(); ctx.arc(-4,2,1.6,0,Math.PI*2); ctx.arc(4,2,1.6,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#e8d040';
  for(let i=-2;i<=2;i++){ ctx.beginPath(); ctx.moveTo(i*16-6,-22); ctx.lineTo(i*16,-40); ctx.lineTo(i*16+6,-22); ctx.fill(); }
  ctx.restore();
}

function drawWhirley(){
  if(!whirley) return;
  const {x,y,color} = whirley;
  ctx.save(); ctx.translate(x,y);
  const flap = Math.sin(animClock*12)*0.6;
  ctx.fillStyle='#b060d8';
  ctx.save(); ctx.rotate(-0.5+flap); ctx.beginPath(); ctx.ellipse(-20,-6,26,10,0,0,Math.PI*2); ctx.fill(); ctx.restore();
  ctx.save(); ctx.rotate(0.5-flap); ctx.beginPath(); ctx.ellipse(20,-6,26,10,0,0,Math.PI*2); ctx.fill(); ctx.restore();
  ctx.fillStyle='#9c40c8'; ctx.beginPath(); ctx.ellipse(0,2,16,12,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(10,-6,9,8,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#ffb000'; ctx.beginPath(); ctx.moveTo(16,-8); ctx.lineTo(30,-4); ctx.lineTo(16,-2); ctx.fill();
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(12,-8,3,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#222'; ctx.beginPath(); ctx.arc(13,-8,1.5,0,Math.PI*2); ctx.fill();
  if(!whirley.dropped) drawEgg(0,18,color,0.8,1);
  ctx.restore();
}

function drawFoot(){
  if(!foot) return;
  ctx.save(); ctx.translate(W/2, foot.y);
  ctx.fillStyle='#7a5a2a'; ctx.fillRect(-46,-260,92,260);
  ctx.fillStyle='#9c7438'; ctx.fillRect(-46,-260,18,260);
  ctx.fillStyle='#8a6a34'; ctx.beginPath(); ctx.ellipse(0,0,90,46,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#e8e0d0';
  for(let i=-2;i<=2;i++){ ctx.beginPath(); ctx.moveTo(i*34-10,30); ctx.lineTo(i*34,52); ctx.lineTo(i*34+10,30); ctx.fill(); }
  ctx.restore();
}

let animClock = 0;
function draw(){
  ctx.save();
  if(shake>0) ctx.translate(rnd(-shake,shake), rnd(-shake,shake));

  ctx.drawImage(bgCanvas, 0, 0, W, H);

  // twinkling embers
  for(const s of EMBERS){
    ctx.globalAlpha = 0.25 + 0.3*Math.sin(animClock*1.6 + s.ph);
    ctx.fillStyle = '#ffc878';
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;

  // danger line
  ctx.save();
  ctx.strokeStyle='rgba(255,60,60,'+(0.3+0.2*Math.sin(animClock*5))+')';
  ctx.setLineDash([10,8]); ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(0,DANGER_Y); ctx.lineTo(W,DANGER_Y); ctx.stroke();
  ctx.restore();

  // aim preview (cached)
  if(running && !proj && !paused && !foot){
    const {pts,target} = getAim();
    ctx.save();
    ctx.fillStyle='rgba(255,240,180,0.85)';
    for(let i=4;i<pts.length;i+=3){ const a=1-i/pts.length;
      ctx.globalAlpha=0.2+a*0.6; ctx.beginPath(); ctx.arc(pts[i].x,pts[i].y,3,0,Math.PI*2); ctx.fill(); }
    ctx.globalAlpha=1; ctx.restore();
    if(target){
      const pulse = 1 + 0.12*Math.sin(animClock*7);
      ctx.save(); ctx.globalAlpha=0.5;
      drawEgg(cellX(target[0],target[1]), cellY(target[0]), queue[0]?queue[0].color:0, pulse*0.96, 0.45);
      ctx.strokeStyle='rgba(255,255,255,0.7)'; ctx.lineWidth=2; ctx.setLineDash([4,4]);
      ctx.beginPath(); ctx.arc(cellX(target[0],target[1]),cellY(target[0]),R*pulse,0,Math.PI*2); ctx.stroke();
      ctx.restore();
    }
  }

  // grid eggs (with smooth-descend slide)
  ctx.save();
  ctx.translate(0, slide);
  for(let r=0;r<grid.length;r++){
    const row = grid[r];
    for(let c=0;c<row.length;c++){
      const e = row[c];
      if(e) drawEgg(cellX(r,c), cellY(r), e.color, easeOutBack(e.appear), 1, Math.sin(e.wob)*0.04);
    }
  }
  ctx.restore();

  // popping
  for(const p of popping) drawEgg(p.x,p.y,p.color,1+p.t*0.7,1-p.t);

  // falling
  for(const f of falling) drawEgg(f.x,f.y,f.color,1,clamp((H-f.y)/120,0,1),f.rot);

  // particles
  for(const p of particles){
    ctx.save(); ctx.globalAlpha=Math.max(0,p.life);
    if(p.shard){
      ctx.translate(p.x,p.y); ctx.rotate(p.rot);
      ctx.fillStyle=PALETTE[p.color].light;
      ctx.beginPath(); ctx.moveTo(0,-p.r); ctx.lineTo(p.r*0.8,p.r*0.7); ctx.lineTo(-p.r*0.8,p.r*0.7); ctx.closePath(); ctx.fill();
    } else {
      ctx.fillStyle=PALETTE[p.color].base;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2); ctx.fill();
    }
    ctx.restore();
  }

  drawWhirley();
  drawDino();

  if(proj){ if(proj.bomb) drawBomb(proj.x,proj.y); else drawEgg(proj.x,proj.y,proj.egg.color,1,1,proj.spin*0.1); }
  else if(running && !foot){
    if(nextIsBomb) drawBomb(LAUNCH_X,LAUNCH_Y-34);
    else if(queue[0]) drawEgg(LAUNCH_X,LAUNCH_Y-34,queue[0].color,1,1,Math.sin(animClock*2)*0.05);
  }

  // next-egg preview
  ctx.save();
  ctx.fillStyle='rgba(0,0,0,0.4)'; roundRect(W-92,H-50,84,40,8); ctx.fill();
  ctx.fillStyle='#ffe9a0'; ctx.font='bold 11px Trebuchet MS'; ctx.fillText('NEXT',W-84,H-34);
  if(queue[1]) drawEgg(W-32,H-30,queue[1].color,0.78);
  ctx.restore();

  // score pops
  for(const s of scorePops){ ctx.save(); ctx.globalAlpha=1-s.t;
    ctx.font='bold 18px Trebuchet MS'; ctx.fillStyle='#fff'; ctx.strokeStyle='#000'; ctx.lineWidth=3;
    ctx.textAlign='center'; const txt='+'+s.amt+(s.combo>=2?'  x'+s.combo:'');
    ctx.strokeText(txt,s.x,s.y); ctx.fillText(txt,s.x,s.y); ctx.restore(); }
  ctx.textAlign='left';

  drawFoot();
  ctx.restore();  // end shake

  // combo callout
  if(comboMsgT>0){
    ctx.save(); ctx.textAlign='center';
    const sc = 1 + (1-comboMsgT)*0.4;
    ctx.globalAlpha = clamp(comboMsgT*1.5,0,1);
    ctx.translate(W/2, 220); ctx.scale(sc,sc);
    ctx.font='900 38px Trebuchet MS'; ctx.lineWidth=5; ctx.strokeStyle='#000';
    ctx.fillStyle='#ffd23f';
    ctx.strokeText('COMBO x'+comboMsg+'!',0,0); ctx.fillText('COMBO x'+comboMsg+'!',0,0);
    ctx.restore(); ctx.textAlign='left';
  }

  // whirley / bomb banner
  if(whirleyMsg>0){
    ctx.save(); ctx.globalAlpha=clamp(whirleyMsg/30,0,1);
    ctx.font='900 30px Trebuchet MS'; ctx.textAlign='center';
    ctx.fillStyle = nextIsBomb ? '#ff5b5b' : '#9be870'; ctx.strokeStyle='#000'; ctx.lineWidth=4;
    const t = nextIsBomb ? '⚡ MEGA COMBO! BOMB READY! ⚡' : "WHIRLEY'S COMING!";
    ctx.strokeText(t,W/2,140); ctx.fillText(t,W/2,140);
    ctx.restore(); ctx.textAlign='left';
  }

  if(flash>0){ ctx.fillStyle='rgba(255,240,200,'+flash*0.4+')'; ctx.fillRect(0,0,W,H); }

  if(paused && running){
    ctx.fillStyle='rgba(0,0,0,0.52)'; ctx.fillRect(0,0,W,H);
    ctx.save(); ctx.textAlign='center';
    ctx.font='900 64px Trebuchet MS'; ctx.strokeStyle='#000'; ctx.lineWidth=5;
    ctx.strokeText('PAUSED',W/2,H/2-10); ctx.fillStyle='#ffd23f'; ctx.fillText('PAUSED',W/2,H/2-10);
    ctx.font='bold 20px Trebuchet MS'; ctx.fillStyle='#ffe9a0';
    ctx.fillText('Press P to continue',W/2,H/2+36);
    ctx.restore(); ctx.textAlign='left';
  }
}

function roundRect(x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }

// ───────────────────────────── loop ─────────────────────────────────
function loop(t){
  const dt = Math.min(0.05, (t-lastT)/1000) || 0.016; lastT=t;
  animClock += dt;
  update(dt);
  draw();
  animId = requestAnimationFrame(loop);
}

// ───────────────────────────── HUD / UI ─────────────────────────────
function updateHUD(){
  document.getElementById('scoreEl').textContent = score;
  document.getElementById('levelEl').textContent = level;
  document.getElementById('shotsEl').textContent = shots;
  if(score > highScore){ highScore = score; localStorage.setItem('dinopop_hs', highScore); }
  document.getElementById('hsEl').textContent = highScore;
}
const overlay = document.getElementById('overlay');
const msgEl = document.getElementById('msg');
const subEl = document.getElementById('sub');
const titleEl = document.getElementById('title');
const playBtn = document.getElementById('playBtn');

function showOverlay(msg, sub, btn){
  overlay.classList.remove('hidden');
  if(msg){ msgEl.textContent=msg; msgEl.classList.remove('hidden'); titleEl.classList.add('hidden'); }
  else { msgEl.classList.add('hidden'); titleEl.classList.remove('hidden'); }
  subEl.innerHTML = sub.replace(/\n/g,'<br>');
  playBtn.textContent = btn;
}

playBtn.addEventListener('click', ()=>{
  ensureAudio(); sfxClick();
  overlay.classList.add('hidden');
  if(msgEl.textContent==='GAME OVER' || titleEl.classList.contains('hidden')===false){
    score=0; level=1; shots=0;
  }
  shots=0;
  buildLevel();
  running=true; paused=false;
  syncMusic();
  if(!animId){ lastT=performance.now(); animId=requestAnimationFrame(loop); }
});

// ── boot ──
buildSprites();
buildBackground();
buildLevel(); running=false;
lastT=performance.now(); animId=requestAnimationFrame(loop);

// ───────────────────────────── input ────────────────────────────────
canvas.addEventListener('mousemove', e=>{
  const r = canvas.getBoundingClientRect();
  aim((e.clientX-r.left)*(W/r.width), (e.clientY-r.top)*(H/r.height));
});
function aim(mx,my){
  let dx = mx-LAUNCH_X, dy = my-(LAUNCH_Y-20);
  if(dy > -10) dy = -10;
  aimAngle = clamp(Math.atan2(dy,dx), -Math.PI+0.18, -0.18);
}
canvas.addEventListener('click', ()=> shoot());
window.addEventListener('keydown', e=>{
  if(e.code==='Space'){ e.preventDefault(); shoot(); }
  if(e.code==='KeyP'){ paused=!paused; syncMusic(); }
});
canvas.addEventListener('touchmove', e=>{ e.preventDefault();
  const r=canvas.getBoundingClientRect(), t=e.touches[0];
  aim((t.clientX-r.left)*(W/r.width),(t.clientY-r.top)*(H/r.height));
},{passive:false});
canvas.addEventListener('touchend', e=>{ e.preventDefault(); shoot(); },{passive:false});

document.getElementById('soundBtn').addEventListener('click', ()=>{
  audioOn=!audioOn;
  document.getElementById('soundBtn').textContent = audioOn?'🔊 SND':'🔇 SND';
  if(audioOn){ ensureAudio(); sfxClick(); }
  syncMusic();
});
</script>
</body>
</html>
